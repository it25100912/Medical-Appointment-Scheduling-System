<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile | Patient Portal</title>
    <link rel="stylesheet" href="css/dashboard.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .profile-container {
            max-width: 960px;
            margin: 0 auto;
            padding: 1.5rem 0;
        }
        .profile-header {
            display: flex;
            align-items: center;
            gap: 2rem;
            margin-bottom: 2rem;
            padding: 2rem;
            background: #FFFFFF;
            border-radius: 12px;
            border: 1px solid #E2E8F0;
        }
        .profile-avatar {
            width: 96px;
            height: 96px;
            border-radius: 50%;
            background: #EFF6FF;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.2rem;
            color: var(--primary);
            font-weight: 700;
            border: 1px solid #BFDBFE;
            box-shadow: none;
        }
        .profile-info h1 {
            font-size: 1.6rem;
            font-weight: 800;
            color: #0F172A;
            margin-bottom: 0.4rem;
        }
        .profile-info p {
            color: var(--text-muted);
            font-size: 0.95rem;
            font-weight: 500;
            margin-bottom: 0.25rem;
        }
        .edit-toggle {
            margin-left: auto;
        }
        .form-section {
            background: #FFFFFF;
            border: 1px solid #E2E8F0;
            border-radius: 12px;
            padding: 2.2rem;
            margin-bottom: 2rem;
        }
        .section-title {
            font-size: 1.15rem;
            font-weight: 700;
            margin-bottom: 1.8rem;
            color: #0F172A;
            border-left: 4px solid var(--primary);
            padding-left: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .form-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1.5rem;
        }
        .form-group {
            display: flex;
            flex-direction: column;
        }
        .form-group label {
            font-weight: 700;
            margin-bottom: 0.6rem;
            color: #475569;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .form-group input,
        .form-group select,
        .form-group textarea {
            padding: 0.8rem 1rem;
            border: 1px solid #E2E8F0;
            border-radius: 8px;
            font-size: 0.95rem;
            font-weight: 500;
            font-family: inherit;
            color: #0F172A;
            background: #FFFFFF;
            transition: all 0.15s ease;
        }
        .form-group input:read-only,
        .form-group select:disabled,
        .form-group textarea:read-only {
            background-color: #F8FAFC;
            border-color: #E2E8F0;
            color: #475569;
            cursor: default;
            opacity: 1;
            -webkit-text-fill-color: #475569;
        }
        .form-group input:not(:read-only):focus,
        .form-group select:not(:disabled):focus,
        .form-group textarea:not(:read-only):focus {
            outline: none;
            border-color: var(--primary);
            background-color: #FFFFFF;
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
        }
        .form-group textarea {
            grid-column: 1 / -1;
            min-height: 100px;
            resize: vertical;
        }
        .button-group {
            display: flex;
            gap: 1rem;
            justify-content: flex-end;
            margin-top: 2rem;
            border-top: 1px solid #E2E8F0;
            padding-top: 1.5rem;
        }
        .button-group button {
            padding: 0.75rem 2rem;
            border: 1px solid #E2E8F0;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.15s ease;
        }
        .btn-save {
            background: var(--primary);
            color: white;
            border-color: var(--primary) !important;
        }
        .btn-save:hover {
            background: #1D4ED8;
        }
        .btn-cancel {
            background: #FFFFFF;
            color: #475569;
        }
        .btn-cancel:hover {
            background: #F8FAFC;
            color: #0F172A;
        }
        .btn-edit {
            background: var(--primary);
            color: white;
            padding: 0.65rem 1.4rem;
            border: 1px solid var(--primary);
            border-radius: 8px;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            box-shadow: none;
            transition: all 0.15s ease;
        }
        .btn-edit:hover {
            background: #1D4ED8;
            border-color: #1D4ED8;
        }
        .full-width {
            grid-column: 1 / -1;
        }
        .loading, .error {
            padding: 2rem;
            text-align: center;
            border-radius: 12px;
            margin: 2rem 0;
            background: #FFFFFF;
            border: 1px solid #E2E8F0;
        }
        .loading {
            color: var(--text-muted);
        }
        .error {
            background: #FEF2F2;
            border-color: #FCA5A5;
            color: #DC2626;
        }
        @media (max-width: 768px) {
            .form-grid {
                grid-template-columns: 1fr;
            }
            .profile-header {
                flex-direction: column;
                align-items: center;
                text-align: center;
            }
            .edit-toggle {
                margin-left: 0;
                margin-top: 1rem;
            }
        }
    </style>
</head>
<body>
    <aside class="sidebar">
        <div class="logo-section">
            <div class="logo-icon"><i class="fas fa-shield-alt"></i></div>
            <div class="logo-text"><h2>MediSync</h2><p>Patient Portal</p></div>
        </div>
        <nav class="nav-links">
            <a href="index.html" class="nav-item"><i class="fas fa-th-large"></i> <span>Dashboard</span></a>
            <a href="patient-profile.html" class="nav-item active"><i class="fas fa-id-card"></i> <span>My Profile</span></a>
            <a href="appointments.html" class="nav-item"><i class="fas fa-calendar-alt"></i> <span>Appointments</span></a>
            <a href="records.html" class="nav-item"><i class="fas fa-file-medical"></i> <span>Medical Records</span></a>
            <a href="#" class="nav-item" onclick="logout()"><i class="fas fa-sign-out-alt"></i> <span>Logout</span></a>
        </nav>
    </aside>

    <div class="content-wrapper">
        <header class="top-header" style="justify-content: flex-end;">
            <div class="header-actions">
                <div class="icon-btn notification-bell">
                    <i class="far fa-bell"></i>
                    <span class="notification-badge"></span>
                </div>
                <div class="header-divider"></div>
                <div class="user-profile">
                    <div class="user-info">
                        <p class="user-name">Patient Portal</p>
                        <p class="user-role">Profile Management</p>
                    </div>
                    <img src="https://ui-avatars.com/api/?name=Patient&background=2563eb&color=white" class="user-avatar" alt="Patient">
                </div>
            </div>
        </header>

        <div class="profile-container">
            <div id="loading" class="loading" style="display:none;">
                <i class="fas fa-spinner fa-spin"></i> Loading your profile...
            </div>
            <div id="error" class="error" style="display:none;"></div>
            <div id="profile-content" style="display:none;">
                <div class="profile-header">
                    <div class="profile-avatar" id="avatar">P</div>
                    <div class="profile-info">
                        <h1 id="patient-name">Patient Name</h1>
                        <p id="patient-email">email@medisync.pro</p>
                        <p id="patient-type">Patient Type</p>
                    </div>
                    <button class="btn-edit edit-toggle" onclick="toggleEditMode()" id="edit-btn">
                        <i class="fas fa-edit"></i> Edit Profile
                    </button>
                </div>

                <div class="form-section">
                    <h2 class="section-title">Personal Information</h2>
                    <form id="profile-form">
                        <div class="form-grid">
                            <div class="form-group">
                                <label>Full Name</label>
                                <input type="text" id="name" readonly>
                            </div>
                            <div class="form-group">
                                <label>Email</label>
                                <input type="email" id="email" readonly>
                            </div>
                            <div class="form-group">
                                <label>Phone Number</label>
                                <input type="tel" id="phone" readonly>
                            </div>
                            <div class="form-group">
                                <label>NIC / Passport</label>
                                <input type="text" id="nic" readonly>
                            </div>
                            <div class="form-group">
                                <label>Date of Birth</label>
                                <input type="date" id="dateOfBirth" readonly>
                            </div>
                            <div class="form-group">
                                <label>Blood Group</label>
                                <select id="bloodGroup" disabled>
                                    <option value="">Select Group</option>
                                    <option value="A+">A+</option>
                                    <option value="A-">A-</option>
                                    <option value="B+">B+</option>
                                    <option value="B-">B-</option>
                                    <option value="AB+">AB+</option>
                                    <option value="AB-">AB-</option>
                                    <option value="O+">O+</option>
                                    <option value="O-">O-</option>
                                </select>
                            </div>
                            <div class="form-group full-width">
                                <label>Address</label>
                                <textarea id="address" readonly></textarea>
                            </div>
                        </div>

                        <div class="form-section" style="margin-top: 2rem;">
                            <h2 class="section-title">Account Security</h2>
                            <div class="form-grid">
                                <div class="form-group">
                                    <label>New Password (Leave blank to keep current)</label>
                                    <input type="password" id="password" placeholder="••••••••" style="display:none;">
                                </div>
                            </div>
                        </div>

                        <div class="button-group" id="button-group" style="display:none;">
                            <button type="button" class="btn-cancel" onclick="toggleEditMode()">Cancel</button>
                            <button type="submit" class="btn-save">Save Changes</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="js/common.js"></script>
    <script>
        let isEditMode = false;
        let currentPatient = null;

        async function loadPatientProfile() {
            const loading = document.getElementById('loading');
            const error = document.getElementById('error');
            const content = document.getElementById('profile-content');

            loading.style.display = 'block';
            error.style.display = 'none';
            content.style.display = 'none';

            try {
                const patient = await apiFetch('/patients/me');
                currentPatient = patient;

                document.getElementById('patient-name').textContent = patient.name || 'Patient';
                document.getElementById('patient-email').textContent = patient.email || 'N/A';
                document.getElementById('patient-type').textContent = patient.patientType === 'INPATIENT' ? 'Inpatient' : 'Outpatient';
                
                const initials = (patient.name || 'P')
                    .split(' ')
                    .map(n => n[0])
                    .join('')
                    .substring(0, 2)
                    .toUpperCase();
                document.getElementById('avatar').textContent = initials;

                document.getElementById('name').value = patient.name || '';
                document.getElementById('email').value = patient.email || '';
                document.getElementById('phone').value = patient.phone || '';
                document.getElementById('nic').value = patient.nic || '';
                document.getElementById('dateOfBirth').value = patient.dateOfBirth || '';
                document.getElementById('bloodGroup').value = patient.bloodGroup || '';
                document.getElementById('address').value = patient.address || '';

                loading.style.display = 'none';
                content.style.display = 'block';
            } catch (err) {
                error.style.display = 'block';
                error.innerHTML = `<i class="fas fa-exclamation-circle"></i> ${err.message || 'Failed to load profile'}`;
                loading.style.display = 'none';
            }
        }

        function toggleEditMode() {
            isEditMode = !isEditMode;
            const fields = document.querySelectorAll('#profile-form input, #profile-form select, #profile-form textarea');
            const buttonGroup = document.getElementById('button-group');
            const editBtn = document.getElementById('edit-btn');

            fields.forEach(field => {
                if (field.id === 'password') {
                    field.style.display = isEditMode ? 'block' : 'none';
                    field.readOnly = false;
                } else if (field.id !== 'email' && field.id !== 'nic') {
                    if (field.tagName === 'SELECT') {
                        field.disabled = !isEditMode;
                    } else {
                        field.readOnly = !isEditMode;
                    }
                }
            });

            buttonGroup.style.display = isEditMode ? 'flex' : 'none';
            editBtn.style.display = isEditMode ? 'none' : 'inline-block';
        }

        document.getElementById('profile-form').addEventListener('submit', async (e) => {
            e.preventDefault();

            const btn = e.target.querySelector('button[type="submit"]');
            const originalText = btn.innerHTML;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Saving...';
            btn.disabled = true;

            const data = {
                name: document.getElementById('name').value,
                email: currentPatient.email,
                phone: document.getElementById('phone').value,
                nic: currentPatient.nic,
                dateOfBirth: document.getElementById('dateOfBirth').value,
                bloodGroup: document.getElementById('bloodGroup').value,
                address: document.getElementById('address').value,
                patientType: currentPatient.patientType
            };

            const password = document.getElementById('password').value;
            if (password) {
                data.password = password;
            }

            try {
                await apiFetch(`/patients/${currentPatient.id}`, 'PUT', data);
                showToast('Profile updated successfully!', 'success');
                toggleEditMode();
                loadPatientProfile();
            } catch (error) {
                showToast(error.message || 'Failed to update profile', 'error');
            } finally {
                btn.innerHTML = originalText;
                btn.disabled = false;
            }
        });

        document.addEventListener('DOMContentLoaded', loadPatientProfile);
    </script>
</body>
</html>
