<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doctor Management | MediSync Pro</title>
    <link rel="stylesheet" href="css/dashboard.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .day-checkbox-label:has(input:checked) {
            background: #eff6ff !important;
            border-color: #2563eb !important;
            color: #2563eb !important;
        }
    </style>
</head>
<body>

    <aside class="sidebar">
        <div class="logo-section">
            <div class="logo-icon"><i class="fas fa-shield-alt"></i></div>
            <div class="logo-text"><h2>MediSync</h2><p>Pro System</p></div>
        </div>
        <nav class="nav-links">
            <a href="index.html" class="nav-item"><i class="fas fa-th-large"></i> <span>Dashboard</span></a>
            <a href="patients.html" class="nav-item"><i class="fas fa-users"></i> <span>Patients</span></a>
            <a href="doctors.html" class="nav-item active"><i class="fas fa-user-md"></i> <span>Doctors</span></a>
            
            <a href="appointments.html" class="nav-item"><i class="fas fa-calendar-alt"></i> <span>Appointments</span></a>
            <a href="records.html" class="nav-item"><i class="fas fa-file-medical"></i> <span>Medical Records</span></a>
            <a href="billing.html" class="nav-item"><i class="fas fa-file-invoice-dollar"></i> <span>Billing</span></a>
            <a href="admin.html" class="nav-item"><i class="fas fa-user-shield"></i> <span>Admin</span></a>
            <a href="#" class="nav-item" onclick="logout()"><i class="fas fa-sign-out-alt"></i> <span>Logout</span></a>
        </nav>
    </aside>

    <div class="content-wrapper">
        <header class="top-header">
            <div class="search-container">
                <input type="text" id="system-search" placeholder="Search clinical cloud (Doctors, Specialty, ID)...">
            </div>
            <div class="header-actions">
                <div class="icon-btn notification-bell">
                    <i class="far fa-bell"></i>
                    <span class="notification-badge"></span>
                </div>
                <div class="header-divider"></div>
                <div class="user-profile">
                    <div class="user-info">
                        <p class="user-name">Administrator</p>
                        <p class="user-role">System Level 4</p>
                    </div>
                    <img src="https://ui-avatars.com/api/?name=Admin+User&background=2563eb&color=white" class="user-avatar" alt="Admin">
                </div>
            </div>
        </header>

        <div class="content-body">
            <section class="fade-in">
                <div class="doctor-mgmt-header">
                    <div>
                        <h1>Doctor Management</h1>
                        <p style="color: var(--text-muted); font-weight: 500;">Credentialing and active clinical provider directory.</p>
                    </div>
                    <button class="btn-add-premium" onclick="openOnboardModal()">
                        <i class="fas fa-plus"></i> Add Doctor
                    </button>
                </div>

                <div class="roster-card">
                    <div class="table-header">
                        <h2>Doctor Roster</h2>
                    </div>
                    <table class="roster-table">
                        <thead>
                            <tr>
                                <th class="col-patient">Doctor</th>
                                <th class="col-contact">Specialization</th>
                                <th class="col-blood">Experience</th>
                                <th class="col-status">Status</th>
                                <th class="col-actions">Actions</th>
                            </tr>
                        </thead>
                        <tbody id="doctor-roster-body">
                            <!-- Data injected here -->
                        </tbody>
                    </table>
                </div>
            </section>
        </div>
    </div>

    <!-- Registration Modal -->
    <div id="doctorModal" class="modal">
        <div class="modal-content">
            <button class="modal-close" onclick="closeModal()"><i class="fas fa-times"></i></button>
            <h2 style="margin-bottom: 2rem; color: var(--text-main); font-weight: 800; letter-spacing: -1px;">Register New Doctor</h2>
            <form id="doctor-form">
                <div class="form-grid">
                    <div class="form-group form-full">
                        <label>Provider Full Name</label>
                        <input type="text" id="doc-name" placeholder="Dr. Jane Smith" required>
                    </div>
                    <div class="form-group">
                        <label>Professional Email</label>
                        <input type="email" id="doc-email" placeholder="doctor@example.com" required>
                    </div>
                    <div class="form-group">
                        <label>Contact Number</label>
                        <input type="text" id="doc-phone" placeholder="+94 XX XXX XXXX" required>
                    </div>
                    <div class="form-group form-full">
                        <label>Clinical Specialization</label>
                        <select id="doc-spec">
                            <option value="Cardiology">Cardiology</option>
                            <option value="Neurology">Neurology</option>
                            <option value="Pediatrics">Pediatrics</option>
                            <option value="Orthopedics">Orthopedics</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Medical License No</label>
                        <input type="text" id="doc-license" placeholder="SLMC-XXXXX" required>
                    </div>
                    <div class="form-group">
                        <label>Experience (Years)</label>
                        <input type="number" id="doc-exp" placeholder="10" required>
                    </div>
                    <div class="form-group form-full">
                        <label>OPD Consultation Fee (LKR)</label>
                        <input type="number" id="doc-fee" placeholder="1500.00" step="0.01" required>
                    </div>
                    <div class="form-group form-full">
                        <label style="margin-bottom: 0.75rem; display: block;">Available Days</label>
                        <div class="days-checkbox-group" style="display: flex; flex-wrap: wrap; gap: 0.75rem;">
                            <label class="day-checkbox-label" style="display: flex; align-items: center; gap: 0.5rem; cursor: pointer; background: #f8fafc; border: 1.5px solid #e2e8f0; padding: 0.5rem 0.75rem; border-radius: 8px; font-size: 0.85rem; font-weight: 600; color: #475569; transition: all 0.2s;">
                                <input type="checkbox" name="availableDays" value="Monday" style="width: auto !important; height: auto !important; margin: 0 !important; cursor: pointer; display: inline-block !important;"> Monday
                            </label>
                            <label class="day-checkbox-label" style="display: flex; align-items: center; gap: 0.5rem; cursor: pointer; background: #f8fafc; border: 1.5px solid #e2e8f0; padding: 0.5rem 0.75rem; border-radius: 8px; font-size: 0.85rem; font-weight: 600; color: #475569; transition: all 0.2s;">
                                <input type="checkbox" name="availableDays" value="Tuesday" style="width: auto !important; height: auto !important; margin: 0 !important; cursor: pointer; display: inline-block !important;"> Tuesday
                            </label>
                            <label class="day-checkbox-label" style="display: flex; align-items: center; gap: 0.5rem; cursor: pointer; background: #f8fafc; border: 1.5px solid #e2e8f0; padding: 0.5rem 0.75rem; border-radius: 8px; font-size: 0.85rem; font-weight: 600; color: #475569; transition: all 0.2s;">
                                <input type="checkbox" name="availableDays" value="Wednesday" style="width: auto !important; height: auto !important; margin: 0 !important; cursor: pointer; display: inline-block !important;"> Wednesday
                            </label>
                            <label class="day-checkbox-label" style="display: flex; align-items: center; gap: 0.5rem; cursor: pointer; background: #f8fafc; border: 1.5px solid #e2e8f0; padding: 0.5rem 0.75rem; border-radius: 8px; font-size: 0.85rem; font-weight: 600; color: #475569; transition: all 0.2s;">
                                <input type="checkbox" name="availableDays" value="Thursday" style="width: auto !important; height: auto !important; margin: 0 !important; cursor: pointer; display: inline-block !important;"> Thursday
                            </label>
                            <label class="day-checkbox-label" style="display: flex; align-items: center; gap: 0.5rem; cursor: pointer; background: #f8fafc; border: 1.5px solid #e2e8f0; padding: 0.5rem 0.75rem; border-radius: 8px; font-size: 0.85rem; font-weight: 600; color: #475569; transition: all 0.2s;">
                                <input type="checkbox" name="availableDays" value="Friday" style="width: auto !important; height: auto !important; margin: 0 !important; cursor: pointer; display: inline-block !important;"> Friday
                            </label>
                            <label class="day-checkbox-label" style="display: flex; align-items: center; gap: 0.5rem; cursor: pointer; background: #f8fafc; border: 1.5px solid #e2e8f0; padding: 0.5rem 0.75rem; border-radius: 8px; font-size: 0.85rem; font-weight: 600; color: #475569; transition: all 0.2s;">
                                <input type="checkbox" name="availableDays" value="Saturday" style="width: auto !important; height: auto !important; margin: 0 !important; cursor: pointer; display: inline-block !important;"> Saturday
                            </label>
                            <label class="day-checkbox-label" style="display: flex; align-items: center; gap: 0.5rem; cursor: pointer; background: #f8fafc; border: 1.5px solid #e2e8f0; padding: 0.5rem 0.75rem; border-radius: 8px; font-size: 0.85rem; font-weight: 600; color: #475569; transition: all 0.2s;">
                                <input type="checkbox" name="availableDays" value="Sunday" style="width: auto !important; height: auto !important; margin: 0 !important; cursor: pointer; display: inline-block !important;"> Sunday
                            </label>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Available From Time</label>
                        <input type="time" id="doc-from" required>
                    </div>
                    <div class="form-group">
                        <label>Available To Time</label>
                        <input type="time" id="doc-to" required>
                    </div>
                    <div class="form-group form-full">
                        <label>Account Password</label>
                        <input type="password" id="doc-password" placeholder="Set provider password" required>
                    </div>
                </div>
                <div style="display: flex; justify-content: flex-end; margin-top: 2.5rem; gap: 1.25rem;">
                    <button type="button" class="btn-premium-outline" onclick="closeModal()">Cancel</button>
                    <button type="submit" class="btn-premium-primary" style="min-width: 200px;">Register Provider</button>
                </div>
            </form>
        </div>
    </div>

    <script src="js/common.js"></script>
    <script src="js/doctors.js"></script>
</body>
</html>
